<!DOCTYPE html>
<html lang="en">

<body>
    <p>Click the button to evaluate a function:</p>
    <button onclick="evalFunction(result)">Evaluate Function</button><br>

    <button onclick="Result(demo)">Result</button>
    <p id="result"></p>
    <p id="demo"></p>
    <script>
        function evalFunction() {
            var x = 10;
            var y = 20;
            var a = eval("x + y") + "<br>";
            var b = eval("2 * 2") + "<br>";
            var c = eval("y - x") + "<br>";
            var result = a + b + c;
            document.getElementById("result").innerHTML = result;
        }
    </script>
    <script>
        function Result() {
            var nos = [12, 23, 65, 87, 23, 97];
            function Result(value) {
                return value * 10;
            }
            var product = nos.map(Result);
            product = nos.map(function (value) {
                return value * 10;
            });
            document.getElementById("demo").innerHTML = product;
        }
    </script>
</body>

</html>
