<!DOCTYPE html>
<html lang="en">

<body>
    <p>Multiply each element in the array by 10:</p>
    <p id="product_value"></p>
    <script>
        var nos = [12, 23, 65, 87, 23, 97];
        function myfunction(value) {
            return value * 10;
        }
        var product = nos.map(myfunction);
       product = nos.map(function(value) {
            return value * 10;
        });
        document.getElementById("product_value").innerHTML = product;
    </script>
</body>

</html>
